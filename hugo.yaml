baseURL: "https://braj-avadhi-kavyalok.netlify.app/"
languageCode: "hi"
title: "ब्रज अवधी काव्यलोक"
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Taxonomies — this creates your category/filter system
taxonomies:
  theme: themes
  poet: poets_tax
  forms: forms

# Pagination
pagination:
  pagerSize: 20

# Build settings
enableRobotsTXT: true
enableEmoji: true

params:
  siteName: "ब्रज अवधी काव्यलोक"
  siteNameEn: "Braj Awadhi Kavyalok"
  description: "A digital anthology of Braj language poetry"
  descriptionHi: "ब्रज भाषा काव्य का डिजिटल संग्रह"
  accentColor: "#8B1A1A"   # deep red, like rekhta — change if you want
  bgColor: "#FDF6E3"        # warm cream background

markup:
  goldmark:
    renderer:
      unsafe: true   # allows HTML in markdown — needed for audio embeds
