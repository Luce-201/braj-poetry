{{ define "main" }}
<div class="list-page">

  <header class="list-header">
    <h1>
      <span class="lang-hi">{{ .Title }}</span>
      <span class="lang-en">{{ .Title }}</span>
    </h1>
    <p>{{ len .Pages }} कविताएँ / poems</p>
  </header>

  <div class="poem-grid">
    {{ range .Pages }}
      {{ partial "poem-card.html" . }}
    {{ end }}
  </div>

</div>
{{ end }}
